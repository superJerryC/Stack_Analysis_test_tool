<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 股票分析工具</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --sidebar: #161b22; --card: #1c2128; --border: #30363d;
      --accent: #58a6ff; --green: #3fb950; --red: #f85149;
      --text: #e6edf3; --muted: #8b949e; --hover: #21262d; --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar { width: 260px; min-width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .logo { display: flex; align-items: center; gap: 10px; padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg,#58a6ff,#3fb950); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; }
    .logo-text { font-size: 15px; font-weight: 600; }
    .logo-sub  { font-size: 11px; color: var(--muted); }
    .search-section { padding: 14px 12px 10px; border-bottom: 1px solid var(--border); }
    .market-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
    .market-tab { flex: 1; padding: 5px 0; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .15s; }
    .market-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .market-tab:hover:not(.active) { background: var(--hover); color: var(--text); }
    .search-row { display: flex; gap: 6px; }
    .search-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; padding: 7px 10px; outline: none; transition: border-color .15s; }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--muted); }
    .btn-search { background: var(--accent); border: none; border-radius: 6px; color: #fff; font-size: 13px; font-weight: 600; padding: 7px 12px; cursor: pointer; transition: opacity .15s; }
    .btn-search:hover { opacity: .85; }
    .btn-search:disabled { opacity: .4; cursor: not-allowed; }
    .watchlist-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 8px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .wl-count { background: var(--border); border-radius: 10px; padding: 1px 7px; font-size: 11px; }
    .watchlist-items { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
    .watchlist-items::-webkit-scrollbar { width: 4px; }
    .watchlist-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .wl-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 8px; border-radius: 7px; cursor: pointer; transition: background .12s; position: relative; }
    .wl-item:hover { background: var(--hover); }
    .wl-item.active { background: var(--card); border-left: 3px solid var(--accent); }
    .wl-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .wl-symbol { font-size: 13px; font-weight: 600; }
    .wl-name   { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
    .wl-right  { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .wl-price  { font-size: 13px; font-weight: 600; }
    .wl-chg    { font-size: 11px; }
    .up   { color: var(--red); }
    .down { color: var(--green); }
    .wl-del { position: absolute; top: 4px; right: 4px; background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; opacity: 0; transition: opacity .12s; padding: 2px 4px; border-radius: 4px; }
    .wl-item:hover .wl-del { opacity: 1; }
    .wl-del:hover { color: var(--red); }
    .wl-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 24px 12px; line-height: 1.6; }

    /* ── Main ── */
    .main-content { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
    .main-content::-webkit-scrollbar { width: 6px; }
    .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

    /* ── States ── */
    .state-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--muted); text-align: center; }
    .state-icon { font-size: 52px; opacity: .4; }
    .state-title { font-size: 18px; font-weight: 600; color: var(--text); opacity: .7; }
    .state-desc { font-size: 13px; line-height: 1.7; max-width: 320px; }
    .state-box.error .state-icon { color: var(--red); opacity: 1; }
    .state-box.error .state-title { color: var(--red); opacity: 1; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Quote Card ── */
    .quote-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
    .quote-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .quote-name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .quote-symbol { font-size: 20px; font-weight: 700; }
    .market-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 5px; border: 1px solid var(--border); color: var(--muted); }
    .quote-company { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .quote-date { font-size: 12px; color: var(--muted); }
    .btn-add-wl { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; padding: 5px 12px; cursor: pointer; transition: all .15s; }
    .btn-add-wl:hover { border-color: var(--accent); color: var(--accent); }
    .btn-add-wl.added { border-color: var(--green); color: var(--green); }
    .price-section { display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .price-main { font-size: 38px; font-weight: 700; letter-spacing: -1px; }
    .price-change { font-size: 17px; font-weight: 600; }
    .price-currency { font-size: 13px; color: var(--muted); }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .metric-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
    .metric-value { font-size: 15px; font-weight: 600; }
    .metric-value.up { color: var(--red); }
    .metric-value.down { color: var(--green); }
    .section-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

    /* ── Chart Card ── */
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .chart-top { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .ctrl-btn { background: transparent; border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-size: 11px; font-weight: 500; padding: 3px 8px; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .ctrl-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }
    .ctrl-btn.active { background: var(--hover); color: var(--text); border-color: var(--muted); }
    .ctrl-sep-v { width: 1px; height: 14px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
    .ind-btn[data-ind="ma5"].active  { border-color: #f0b429; color: #f0b429; }
    .ind-btn[data-ind="ma10"].active { border-color: #58a6ff; color: #58a6ff; }
    .ind-btn[data-ind="ma20"].active { border-color: #f85149; color: #f85149; }
    .ind-btn[data-ind="ma60"].active { border-color: #a371f7; color: #a371f7; }
    .ind-btn[data-ind="bb"].active   { border-color: #58a6ff; color: #58a6ff; }
    .ind-btn[data-ind="macd"].active,
    .ind-btn[data-ind="rsi"].active,
    .ind-btn[data-ind="kd"].active   { border-color: var(--accent); color: var(--accent); }
    .chart-spinner-wrap { display: flex; align-items: center; margin-left: auto; }
    .mini-spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    .ohlcv-bar { display: flex; align-items: center; gap: 14px; padding: 5px 14px; font-size: 12px; border-bottom: 1px solid var(--border); min-height: 28px; flex-wrap: wrap; background: var(--bg); }
    .ohlcv-lbl { color: var(--muted); margin-right: 3px; }
    .chart-panel { border-top: 1px solid var(--border); position: relative; }
    .panel-label { position: absolute; top: 3px; left: 10px; font-size: 10px; color: var(--muted); z-index: 3; pointer-events: none; }
    .chart-div { width: 100%; }

    /* ── Score Card ── */
    .score-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; }
    .score-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .score-inner { display: grid; grid-template-columns: 170px 1fr; gap: 20px; align-items: start; }
    .gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .gauge-svg { width: 150px; height: 88px; overflow: visible; }
    .signal-badge { padding: 5px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; }
    .signal-badge.strong-buy { background:#3fb95022; color:#3fb950; border:1px solid #3fb95055; }
    .signal-badge.buy        { background:#58a6ff22; color:#58a6ff; border:1px solid #58a6ff55; }
    .signal-badge.hold       { background:#f0b42922; color:#f0b429; border:1px solid #f0b42955; }
    .signal-badge.watch      { background:#f8514922; color:#f85149; border:1px solid #f8514955; }
    .signal-badge.sell       { background:#f8514933; color:#f85149; border:1px solid #f85149; }
    .comp-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }
    .comp-row { display: grid; grid-template-columns: 76px 1fr 46px; align-items: center; gap: 8px; }
    .comp-name { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .comp-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .comp-bar-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
    .comp-score { font-size: 12px; font-weight: 600; text-align: right; white-space: nowrap; }
    .comp-max { color: var(--muted); font-weight: 400; }
    .score-meta { display: flex; flex-wrap: wrap; gap: 18px; padding: 12px 0; border-top: 1px solid var(--border); margin-bottom: 10px; }
    .meta-item { display: flex; flex-direction: column; gap: 3px; }
    .meta-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .meta-val { font-size: 14px; font-weight: 600; }
    .risk-badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .risk-badge.low  { background:#3fb95022; color:#3fb950; }
    .risk-badge.mid  { background:#f0b42922; color:#f0b429; }
    .risk-badge.high { background:#f8514922; color:#f85149; }
    .score-tips { display: flex; flex-direction: column; gap: 5px; }
    .tip-item { font-size: 12px; color: var(--muted); padding-left: 12px; position: relative; line-height: 1.5; }
    .tip-item::before { content:'·'; position:absolute; left:2px; color:var(--accent); font-size:14px; line-height:1.2; }
    .score-loading { display:flex; align-items:center; gap:10px; padding:20px 0; color:var(--muted); font-size:13px; }
    @media (max-width: 640px) { .score-inner { grid-template-columns: 1fr; } }

    /* ── Stock Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal-box { background: var(--sidebar); border: 1px solid var(--border); border-radius: 14px; width: min(940px, calc(100vw - 32px)); height: min(92vh, 940px); display: flex; flex-direction: column; overflow: hidden; animation: modalIn .15s ease; }
    @keyframes modalIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:none; } }
    .modal-hdr { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 11px 18px; border-bottom: 1px solid var(--border); }
    .modal-hdr-info { flex: 1; min-width: 0; }
    .modal-hdr-title { font-size: 16px; font-weight: 700; }
    .modal-hdr-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-tabs { display: flex; gap: 2px; background: var(--bg); border-radius: 8px; padding: 3px; flex-shrink: 0; }
    .modal-tab { padding: 5px 18px; border-radius: 5px; border: none; background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .modal-tab:hover:not(.active) { color: var(--text); }
    .modal-tab.active { background: var(--card); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.35); }
    .modal-close { flex-shrink: 0; background: none; border: 1px solid transparent; color: var(--muted); font-size: 20px; cursor: pointer; padding: 0 7px; line-height: 1.4; border-radius: 6px; transition: all .15s; }
    .modal-close:hover { border-color: var(--border); color: var(--text); }
    .modal-info-panel { flex: 1; min-height: 0; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
    .modal-info-panel::-webkit-scrollbar { width: 5px; }
    .modal-info-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
    .modal-chart-panel { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow-y: auto; }
    .modal-chart-panel::-webkit-scrollbar { width: 5px; }
    .modal-chart-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
    .modal-chart-panel .chart-card { border-radius: 0; border-left: none; border-right: none; border-top: none; }

    /* ── Scan Nav ── */
    .scan-nav { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .btn-scan-nav { width: 100%; background: transparent; border: 1px solid var(--border); border-radius: 7px; color: var(--muted); font-size: 12px; font-weight: 600; padding: 8px 12px; cursor: pointer; transition: all .15s; text-align: left; display: flex; align-items: center; gap: 8px; }
    .btn-scan-nav:hover { background: var(--hover); color: var(--text); border-color: var(--text); }
    .btn-scan-nav.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Scanner Panel ── */
    .scanner-panel { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
    .scanner-panel::-webkit-scrollbar { width: 6px; }
    .scanner-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
    .btn-back { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; padding: 5px 12px; cursor: pointer; transition: all .15s; }
    .btn-back:hover { border-color: var(--text); color: var(--text); }
    .scan-config { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
    .scan-config-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .strategy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    @media (min-width: 900px) { .strategy-grid { grid-template-columns: repeat(4, 1fr); } }
    .strat-btn { padding: 10px 8px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; text-align: center; }
    .strat-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
    .strat-btn.active { background: rgba(88,166,255,.12); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .strat-name { font-size: 13px; font-weight: 600; display: block; margin-bottom: 3px; color: inherit; }
    .strat-desc { font-size: 10px; display: block; opacity: .7; }
    .preset-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .preset-label { font-size: 11px; color: var(--muted); font-weight: 600; }
    .btn-preset { background: transparent; border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-size: 11px; padding: 4px 10px; cursor: pointer; transition: all .15s; }
    .btn-preset:hover { border-color: var(--accent); color: var(--accent); }
    .scan-symbols-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    #scanSymbols { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 9px 12px; outline: none; resize: vertical; min-height: 62px; font-family: monospace; transition: border-color .15s; }
    #scanSymbols:focus { border-color: var(--accent); }
    #scanSymbols::placeholder { color: var(--muted); }
    .scan-footer { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .btn-run-scan { background: var(--accent); border: none; border-radius: 7px; color: #fff; font-size: 14px; font-weight: 600; padding: 9px 22px; cursor: pointer; transition: opacity .15s; }
    .btn-run-scan:hover { opacity: .85; }
    .btn-run-scan:disabled { opacity: .4; cursor: not-allowed; }
    .scan-hint { font-size: 11px; color: var(--muted); }
    .scan-results-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .scan-results-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding: 12px 18px; border-bottom: 1px solid var(--border); }
    .scan-summary { display: flex; gap: 20px; }
    .scan-stat { display: flex; flex-direction: column; gap: 1px; }
    .scan-stat-val { font-size: 20px; font-weight: 700; }
    .scan-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .result-table-wrap { overflow-x: auto; }
    .result-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
    .result-table th { text-align: left; padding: 9px 12px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); background: var(--bg); font-weight: 600; white-space: nowrap; }
    .result-table th.r, .result-table td.r { text-align: right; }
    .result-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .result-table tr:last-child td { border-bottom: none; }
    .result-table tbody tr:hover td { background: var(--hover); cursor: pointer; }
    .match-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; vertical-align: middle; margin-right: 5px; flex-shrink: 0; }
    .match-dot.yes { background: var(--green); }
    .match-dot.no  { background: var(--border); }
    .scan-empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 13px; line-height: 2; }
    .strat-detail-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-top: 2px; }
    .strat-detail-desc { font-size: 13px; color: var(--text); line-height: 1.65; margin-bottom: 10px; }
    .strat-logic { display: flex; flex-direction: column; gap: 4px; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
    .strat-logic-item { font-size: 12px; color: var(--muted); line-height: 1.5; padding-left: 10px; position: relative; }
    .strat-logic-item::before { content:'·'; position:absolute; left:0; color:var(--accent); }
    .strat-params { display: flex; flex-direction: column; gap: 10px; }
    .strat-param-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 2px; }
    .strat-param-row { display: grid; grid-template-columns: 110px 1fr 52px 68px; align-items: center; gap: 10px; }
    .strat-param-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .strat-param-range { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .strat-param-val { font-size: 13px; font-weight: 600; color: var(--accent); text-align: right; white-space: nowrap; }
    .strat-param-num { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 12px; padding: 3px 6px; outline: none; text-align: center; }
    .strat-param-num:focus { border-color: var(--accent); }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 16px; font-size: 13px; opacity: 0; transform: translateY(8px); transition: all .2s; pointer-events: none; z-index: 1000; }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Market Panel ── */
    .market-panel { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
    .market-panel::-webkit-scrollbar { width: 6px; }
    .market-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
    .mkt-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .mkt-updated { font-size: 11px; color: var(--muted); }
    .btn-refresh { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 11px; padding: 5px 12px; cursor: pointer; transition: all .15s; }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
    .btn-refresh:disabled { opacity: .4; cursor: not-allowed; }
    .mkt-sentiment-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
    .mkt-sent-inner { display: grid; grid-template-columns: 180px 1fr; gap: 24px; align-items: center; }
    @media (max-width: 600px) { .mkt-sent-inner { grid-template-columns: 1fr; } }
    .mkt-gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .mkt-sent-label { font-size: 15px; font-weight: 700; }
    .mkt-sent-sub { font-size: 11px; color: var(--muted); }
    .mkt-factors { display: flex; flex-direction: column; gap: 10px; }
    .mkt-factor-row { display: grid; grid-template-columns: 110px 1fr 52px 64px; align-items: center; gap: 8px; }
    .mkt-factor-name { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .mkt-factor-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .mkt-factor-bar { height: 100%; border-radius: 3px; transition: width .6s ease; }
    .mkt-factor-score { font-size: 12px; font-weight: 600; text-align: right; white-space: nowrap; }
    .mkt-factor-val { font-size: 11px; color: var(--muted); text-align: right; white-space: nowrap; }
    .mkt-index-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
    .mkt-index-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; transition: border-color .12s; }
    .mkt-index-card:hover { border-color: var(--accent); }
    .mkt-idx-name { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
    .mkt-idx-price { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .mkt-idx-chg { font-size: 12px; font-weight: 600; margin-bottom: 10px; }
    .mkt-idx-stats { display: flex; gap: 14px; }
    .mkt-idx-stat { display: flex; flex-direction: column; gap: 2px; }
    .mkt-idx-stat-label { font-size: 10px; color: var(--muted); }
    .mkt-idx-stat-val { font-size: 12px; font-weight: 600; }
    .mkt-idx-error { font-size: 12px; color: var(--muted); padding: 6px 0; }
    .mkt-wl-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .mkt-wl-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .mkt-wl-table th { text-align: left; padding: 8px 14px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); background: var(--bg); font-weight: 600; }
    .mkt-wl-table th.r, .mkt-wl-table td.r { text-align: right; }
    .mkt-wl-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
    .mkt-wl-table tr:last-child td { border-bottom: none; }
    .mkt-wl-table tbody tr:hover td { background: var(--hover); cursor: pointer; }

    /* ── Watchlist Groups ── */
    .watchlist-header .btn-add-group { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px; transition: color .12s; }
    .watchlist-header .btn-add-group:hover { color: var(--accent); }
    .wl-group-bar { display: flex; gap: 3px; padding: 5px 8px 6px; flex-wrap: wrap; border-bottom: 1px solid var(--border); min-height: 34px; }
    .wl-group-wrap { position: relative; display: flex; align-items: center; }
    .wl-group-tab { padding: 3px 9px; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--muted); transition: all .12s; white-space: nowrap; }
    .wl-group-tab:hover:not(.active) { background: var(--hover); color: var(--text); }
    .wl-group-tab.active { background: rgba(88,166,255,.15); border-color: var(--accent); color: var(--accent); }
    .wl-gtab-count { font-size: 10px; opacity: .7; margin-left: 3px; }
    .wl-gtab-edit { display: none; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 0 2px; line-height: 1.2; margin-left: 1px; }
    .wl-group-wrap:hover .wl-gtab-edit { display: inline; }
    .wl-gtab-edit:hover { color: var(--accent); }
    .wl-group-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; flex-shrink: 0; }
    .wl-move { position: absolute; top: 4px; right: 26px; background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; opacity: 0; transition: opacity .12s; padding: 2px 4px; border-radius: 4px; }
    .wl-item:hover .wl-move { opacity: 1; }
    .wl-move:hover { color: var(--accent); }
    /* Floating group menu */
    .wl-gmenu { position: fixed; background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: 4px; box-shadow: 0 6px 24px rgba(0,0,0,.5); z-index: 600; min-width: 140px; max-width: 200px; }
    .wl-gmenu-hd { font-size: 10px; color: var(--muted); padding: 4px 10px 5px; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); margin-bottom: 3px; }
    .wl-gmenu-btn { display: block; width: 100%; text-align: left; background: none; border: none; color: var(--text); font-size: 12px; padding: 6px 10px; cursor: pointer; border-radius: 5px; transition: background .1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wl-gmenu-btn:hover { background: var(--hover); }
    .wl-gmenu-btn.cur { color: var(--accent); font-weight: 600; }
    .wl-gmenu-btn.danger { color: var(--red); }
    .wl-gmenu-sep { height: 1px; background: var(--border); margin: 3px 0; }

    /* ── Light Theme ── */
    [data-theme="light"] {
      --bg: #f6f8fa; --sidebar: #ffffff; --card: #ffffff; --border: #d0d7de;
      --accent: #0969da; --green: #1a7f37; --red: #cf222e;
      --text: #1f2328; --muted: #656d76; --hover: #eaeef2;
    }

    /* ── Theme Toggle ── */
    .btn-theme { margin-left: auto; background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--muted); font-size: 14px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
    .btn-theme:hover { border-color: var(--accent); color: var(--accent); }
    .btn-logout { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--muted); font-size: 14px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; text-decoration: none; }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* ── CSV Export ── */
    .btn-csv { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 11px; padding: 5px 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .btn-csv:hover { border-color: var(--green); color: var(--green); }

    /* ── Responsive Sidebar ── */
    .hamburger { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; background: var(--card); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 18px; padding: 3px 9px; cursor: pointer; line-height: 1.4; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 149; }
    .sidebar-overlay.show { display: block; }
    @media (max-width: 820px) {
      .sidebar { position: fixed; top: 0; bottom: 0; left: -270px; z-index: 150; transition: left .2s ease; }
      .sidebar.open { left: 0; box-shadow: 4px 0 24px rgba(0,0,0,.4); }
      .hamburger { display: block; }
      .main-content  { padding: 52px 14px 14px; }
      .scanner-panel { padding: 52px 14px 14px; }
      .market-panel  { padding: 52px 14px 14px; }
      .score-inner { grid-template-columns: 1fr; }
      .strat-param-row { grid-template-columns: 90px 1fr 44px; }
      .strat-param-num { display: none; }
      .modal-box { width: calc(100vw - 16px); border-radius: 10px; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<button class="hamburger" onclick="toggleSidebar()">☰</button>

<!-- ═══ Sidebar ═══════════════════════════════════════════════ -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">股</div>
    <div><div class="logo-text">AI 股票分析</div><div class="logo-sub">Stock Analyzer</div></div>
    <button class="btn-theme" id="btnTheme" onclick="toggleTheme()" title="切換主題">☀️</button>
    <a href="/logout" class="btn-logout" title="登出">⏏</a>
  </div>
  <div class="search-section">
    <div class="market-tabs">
      <button class="market-tab active" data-suffix=".TW">台股</button>
      <button class="market-tab" data-suffix="">美股</button>
    </div>
    <div class="search-row">
      <input id="symbolInput" type="text" placeholder="輸入代號，如 2330、2317" autocomplete="off" spellcheck="false">
      <button class="btn-search" id="searchBtn">查詢</button>
    </div>
  </div>
  <div class="scan-nav" style="display:flex;flex-direction:column;gap:5px">
    <button class="btn-scan-nav" id="btnScanner" onclick="showScanner()">
      <span style="font-size:15px">🔍</span> 選股掃描
    </button>
    <button class="btn-scan-nav" id="btnMarket" onclick="showMarket()">
      <span style="font-size:15px">🌐</span> 市場概況
    </button>
  </div>
  <div class="watchlist-header">
    <span>自選股</span>
    <span class="wl-count" id="wlCount">0</span>
    <button class="btn-add-group" onclick="addWlGroup()" title="新增群組">+</button>
  </div>
  <div class="wl-group-bar" id="wlGroupBar"></div>
  <div class="watchlist-items" id="watchlistItems"></div>
</aside>

<!-- ═══ Main ══════════════════════════════════════════════════ -->
<main class="main-content" id="mainContent">
  <div class="state-box">
    <div class="state-icon">📈</div>
    <div class="state-title">開始分析股票</div>
    <div class="state-desc">在左側輸入股票代號查詢即時行情<br>台股選「台股」分頁，美股預設支援</div>
  </div>
</main>

<div id="scannerPanel" class="scanner-panel" style="display:none"></div>
<div id="marketPanel" class="market-panel" style="display:none"></div>

<!-- ═══ Stock Modal ══════════════════════════════════════════ -->
<div id="stockModal" class="modal-overlay" style="display:none" onclick="handleModalBg(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <div class="modal-hdr-info">
        <div class="modal-hdr-title" id="modalHdrTitle">載入中...</div>
        <div class="modal-hdr-sub"  id="modalHdrSub"></div>
      </div>
      <div class="modal-tabs" id="modalTabs" style="display:none">
        <button class="modal-tab active" data-tab="info"  onclick="switchModalTab('info')">行情資訊</button>
        <button class="modal-tab"        data-tab="chart" onclick="switchModalTab('chart')">K 線圖表</button>
      </div>
      <button class="modal-close" onclick="closeStockModal()">✕</button>
    </div>
    <div id="mInfoPanel"  class="modal-info-panel">
      <div class="state-box"><div class="spinner"></div><div class="state-desc">正在取得資料...</div></div>
    </div>
    <div id="mChartPanel" class="modal-chart-panel" style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══ Global State ════════════════════════════════════════════
let currentTheme = localStorage.getItem('theme') || 'dark';
let lastScanData = null;

// ═══ Phase 1 ═════════════════════════════════════════════════
let currentSymbol = null;
let currentSuffix = '.TW';
let watchlist = JSON.parse(localStorage.getItem('wl') || '[]');
let wlGroups    = JSON.parse(localStorage.getItem('wl_groups') || '["預設"]');
let activeWlGroup = '全部';
// Migrate old items that have no group field
watchlist.forEach(w => { if (!w.group) w.group = wlGroups[0] || '預設'; });

document.querySelectorAll('.market-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.market-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSuffix = btn.dataset.suffix;
    document.getElementById('symbolInput').placeholder = {
      '.TW': '輸入代號，如 2330、2317',
      '': '輸入代號，如 AAPL、TSLA',
    }[currentSuffix];
    document.getElementById('symbolInput').focus();
  });
});

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('symbolInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function doSearch() {
  const raw = document.getElementById('symbolInput').value.trim().toUpperCase();
  if (!raw) return;
  const clean = raw.replace(/\.(TW|HK)$/i, '');
  loadQuote(clean + currentSuffix);
}

function loadQuote(symbol) {
  currentSymbol = symbol;
  showState('loading');
  document.getElementById('searchBtn').disabled = true;
  fetch(`/api/quote?symbol=${encodeURIComponent(symbol)}`)
    .then(r => r.json())
    .then(data => {
      document.getElementById('searchBtn').disabled = false;
      if (data.error) { showState('error', data.error); return; }
      renderQuote(data);
      updateWatchlistItem(symbol, data);
    })
    .catch(() => {
      document.getElementById('searchBtn').disabled = false;
      showState('error', '網路連線失敗，請確認伺服器是否正常運作');
    });
}

function renderQuote(d) {
  const isUp = d.change >= 0;
  const cls  = chgCls(isUp);
  const sign = isUp ? '+' : '';
  const market = getMarketLabel(d.symbol);
  const inWL = watchlist.some(w => w.symbol === d.symbol);

  const quoteHTML = `
    <div class="quote-card">
      <div class="quote-top">
        <div>
          <div class="quote-name-row">
            <span class="quote-symbol">${esc(d.symbol)}</span>
            <span class="market-badge">${market}</span>
          </div>
          <div class="quote-company">${esc(d.name)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="quote-date">更新：${d.date}</div>
          <button class="btn-add-wl ${inWL ? 'added' : ''}" id="btnAddWL" onclick="toggleWatchlist()">
            ${inWL ? '✓ 已加入自選' : '+ 加入自選'}
          </button>
        </div>
      </div>
      <div class="price-section">
        <span class="price-main ${cls}">${fmt(d.price)}</span>
        <span class="price-change ${cls}">${sign}${fmt(d.change)} (${sign}${fmt(d.change_pct)}%)</span>
        <span class="price-currency">${d.currency}</span>
      </div>
      <div class="section-title">今日行情</div>
      <div class="metrics-grid">
        ${metric('開盤', fmt(d.open))}
        ${metric('最高', fmt(d.high), 'up')}
        ${metric('最低', fmt(d.low), 'down')}
        ${metric('收盤', fmt(d.close))}
        ${metric('前收', fmt(d.prev_close))}
        ${metric('成交量', fmtVol(d.volume))}
        ${d.year_high != null ? metric('52週高', fmt(d.year_high), 'up') : ''}
        ${d.year_low  != null ? metric('52週低', fmt(d.year_low), 'down') : ''}
        ${d.market_cap != null ? metric('市值', fmtCap(d.market_cap)) : ''}
      </div>
    </div>`;

  const chartHTML = buildChartHTML();
  document.getElementById('mainContent').innerHTML = quoteHTML + buildScoreCard() + chartHTML;
  highlightWLItem(d.symbol);
  loadScore(d.symbol);

  // Bind period buttons
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      CH.period   = btn.dataset.period;
      CH.interval = btn.dataset.interval;
      if (currentSymbol) loadChartData(currentSymbol);
    });
  });

  // Bind indicator buttons
  document.querySelectorAll('.ind-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleIndicator(btn.dataset.ind));
  });

  // Init charts after layout
  requestAnimationFrame(() => requestAnimationFrame(() => {
    initCharts();
    if (currentSymbol) loadChartData(currentSymbol);
  }));
}

function metric(label, val, cls = '') {
  return `<div class="metric-item"><div class="metric-label">${label}</div><div class="metric-value ${cls}">${val ?? '--'}</div></div>`;
}

function showState(type, msg = '') {
  const main = document.getElementById('mainContent');
  if (type === 'loading') {
    main.innerHTML = `<div class="state-box"><div class="spinner"></div><div class="state-desc">正在取得 ${currentSymbol} 資料...</div></div>`;
  } else if (type === 'error') {
    main.innerHTML = `<div class="state-box error"><div class="state-icon">⚠️</div><div class="state-title">查詢失敗</div><div class="state-desc">${esc(msg)}</div></div>`;
  }
}

function toggleWatchlist() {
  if (!currentSymbol) return;
  const idx = watchlist.findIndex(w => w.symbol === currentSymbol);
  if (idx >= 0) { watchlist.splice(idx, 1); showToast('已從自選股移除'); }
  else {
    const g = activeWlGroup === '全部' ? (wlGroups[0] || '預設') : activeWlGroup;
    watchlist.push({ symbol: currentSymbol, name: '', price: null, change_pct: null, group: g });
    showToast('已加入自選股');
  }
  saveWatchlist(); renderWatchlist();
  const btn = document.getElementById('btnAddWL');
  if (btn) { const inWL = watchlist.some(w => w.symbol === currentSymbol); btn.textContent = inWL ? '✓ 已加入自選' : '+ 加入自選'; btn.className = 'btn-add-wl' + (inWL ? ' added' : ''); }
}

function updateWatchlistItem(symbol, data) {
  const item = watchlist.find(w => w.symbol === symbol);
  if (item) { item.name = data.name; item.price = data.price; item.change_pct = data.change_pct; saveWatchlist(); renderWatchlist(); }
}

const GROUP_COLORS = ['#58a6ff','#3fb950','#f0b429','#a371f7','#f85149','#ff7b72','#ffa657','#79c0ff'];
function groupColor(g) { const i = wlGroups.indexOf(g); return i >= 0 ? GROUP_COLORS[i % GROUP_COLORS.length] : '#8b949e'; }

function saveWatchlist() { localStorage.setItem('wl', JSON.stringify(watchlist)); document.getElementById('wlCount').textContent = watchlist.length; }
function saveGroups()    { localStorage.setItem('wl_groups', JSON.stringify(wlGroups)); }

function renderGroupTabs() {
  const bar = document.getElementById('wlGroupBar');
  if (!bar) return;
  const all = ['全部', ...wlGroups];
  bar.innerHTML = all.map(g => {
    const isAll = g === '全部';
    const count = isAll ? watchlist.length : watchlist.filter(w => (w.group || wlGroups[0]) === g).length;
    return `<div class="wl-group-wrap">
      <button class="wl-group-tab${g === activeWlGroup ? ' active' : ''}" onclick="selectWlGroup('${esc(g)}')">${esc(g)}<span class="wl-gtab-count">${count}</span></button>
      ${!isAll ? `<button class="wl-gtab-edit" onclick="showGroupTabMenu(event,'${esc(g)}')">⋯</button>` : ''}
    </div>`;
  }).join('');
}

function selectWlGroup(g) {
  activeWlGroup = g;
  renderGroupTabs();
  renderWatchlist();
}

function renderWatchlist() {
  const container = document.getElementById('watchlistItems');
  document.getElementById('wlCount').textContent = watchlist.length;
  renderGroupTabs();
  const filtered = activeWlGroup === '全部' ? watchlist : watchlist.filter(w => (w.group || wlGroups[0]) === activeWlGroup);
  if (filtered.length === 0) {
    container.innerHTML = `<div class="wl-empty">${watchlist.length === 0 ? '尚無自選股<br>查詢後點擊「加入自選」' : '此群組尚無股票'}</div>`;
    return;
  }
  container.innerHTML = filtered.map(item => {
    const isUp = (item.change_pct ?? 0) >= 0;
    const cls  = chgCls(isUp);
    const sign = isUp ? '+' : '';
    const dot  = activeWlGroup === '全部' ? `<span class="wl-group-dot" style="background:${groupColor(item.group||wlGroups[0])}"></span>` : '';
    return `
      <div class="wl-item ${item.symbol === currentSymbol ? 'active' : ''}" onclick="loadQuote('${esc(item.symbol)}')">
        <div class="wl-left"><span class="wl-symbol">${dot}${esc(item.symbol)}</span><span class="wl-name">${esc(item.name || item.symbol)}</span></div>
        <div class="wl-right">
          <span class="wl-price">${item.price != null ? fmt(item.price) : '--'}</span>
          <span class="wl-chg ${cls}">${item.change_pct != null ? sign + fmt(item.change_pct) + '%' : '--'}</span>
        </div>
        <button class="wl-move" onclick="showItemGroupMenu(event,'${esc(item.symbol)}')" title="移至分群">⋯</button>
        <button class="wl-del"  onclick="removeWL(event,'${esc(item.symbol)}')">✕</button>
      </div>`;
  }).join('');
}

function removeWL(e, symbol) {
  e.stopPropagation(); watchlist = watchlist.filter(w => w.symbol !== symbol);
  saveWatchlist(); renderWatchlist(); showToast('已移除自選股');
  const btn = document.getElementById('btnAddWL');
  if (btn && symbol === currentSymbol) { btn.textContent = '+ 加入自選'; btn.className = 'btn-add-wl'; }
}

// ─── Watchlist group management ──────────────────────────────
let _gmenu = null;
function closeGMenu() { if (_gmenu) { _gmenu.remove(); _gmenu = null; } }

function _showMenu(anchorEl, html) {
  closeGMenu();
  const rect = anchorEl.getBoundingClientRect();
  const div  = document.createElement('div');
  div.className = 'wl-gmenu';
  div.innerHTML  = html;
  div.style.top  = (rect.bottom + 4) + 'px';
  div.style.left = Math.min(rect.left, window.innerWidth - 160) + 'px';
  document.body.appendChild(div);
  _gmenu = div;
  setTimeout(() => document.addEventListener('click', closeGMenu, { once: true }), 0);
}

function showGroupTabMenu(e, group) {
  e.stopPropagation();
  const cnt = watchlist.filter(w => (w.group || wlGroups[0]) === group).length;
  _showMenu(e.target, `
    <div class="wl-gmenu-hd">${esc(group)}</div>
    <button class="wl-gmenu-btn" onclick="renameWlGroup('${esc(group)}');closeGMenu()">✎ 重新命名</button>
    <div class="wl-gmenu-sep"></div>
    <button class="wl-gmenu-btn danger" onclick="deleteWlGroup('${esc(group)}');closeGMenu()">✕ 刪除群組${cnt ? '（' + cnt + ' 檔）' : ''}</button>
  `);
}

function showItemGroupMenu(e, symbol) {
  e.stopPropagation();
  const item = watchlist.find(w => w.symbol === symbol);
  const cur  = item?.group || wlGroups[0];
  const rows = wlGroups.map(g =>
    `<button class="wl-gmenu-btn${g === cur ? ' cur' : ''}" onclick="assignItemGroup('${esc(symbol)}','${esc(g)}');closeGMenu()">${esc(g)}</button>`
  ).join('');
  _showMenu(e.target, `<div class="wl-gmenu-hd">移至分群</div>${rows}`);
}

function assignItemGroup(symbol, group) {
  const item = watchlist.find(w => w.symbol === symbol);
  if (!item) return;
  item.group = group;
  saveWatchlist(); renderWatchlist();
  showToast(`已移至「${group}」`);
}

function addWlGroup() {
  const name = prompt('新群組名稱：');
  if (!name?.trim()) return;
  const n = name.trim();
  if (wlGroups.includes(n)) { showToast('群組名稱已存在'); return; }
  wlGroups.push(n);
  saveGroups(); selectWlGroup(n);
}

function renameWlGroup(oldName) {
  const newName = prompt('重新命名群組：', oldName);
  if (!newName?.trim() || newName.trim() === oldName) return;
  const n = newName.trim();
  if (wlGroups.includes(n)) { showToast('群組名稱已存在'); return; }
  wlGroups = wlGroups.map(g => g === oldName ? n : g);
  watchlist.forEach(w => { if (w.group === oldName) w.group = n; });
  if (activeWlGroup === oldName) activeWlGroup = n;
  saveGroups(); saveWatchlist();
  renderGroupTabs(); renderWatchlist();
}

function deleteWlGroup(name) {
  const cnt = watchlist.filter(w => (w.group || wlGroups[0]) === name).length;
  if (!confirm(`刪除群組「${name}」？${cnt ? '\n其中 ' + cnt + ' 檔股票將移至「' + wlGroups[0] + '」' : ''}`)) return;
  watchlist.forEach(w => { if (w.group === name) w.group = wlGroups[0] || '預設'; });
  wlGroups = wlGroups.filter(g => g !== name);
  if (!wlGroups.length) wlGroups.push('預設');
  if (activeWlGroup === name) activeWlGroup = '全部';
  saveGroups(); saveWatchlist();
  renderGroupTabs(); renderWatchlist();
}

function fillGroupStocks(group) {
  const syms = watchlist.filter(w => (w.group || wlGroups[0]) === group).map(w => w.symbol);
  const el = document.getElementById('scanSymbols');
  if (el && syms.length) { el.value = syms.join(', '); showToast(`已帶入「${group}」${syms.length} 檔`); }
}

function highlightWLItem(symbol) {
  document.querySelectorAll('.wl-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.wl-symbol')?.textContent === symbol);
  });
}

// ═══ Phase 3 — Score Card ════════════════════════════════════
function buildScoreCard() {
  return `
    <div class="score-card" id="scoreCard">
      <div class="score-loading">
        <div class="spinner" style="width:18px;height:18px;border-width:2px"></div>
        <span>計算評分中...</span>
      </div>
    </div>`;
}

function fillScoreCard(card, d) {
  const ARC      = 157;
  const scoreArc = ((d.score / 100) * ARC).toFixed(1);
  const gaugeColor = d.score >= 75 ? '#3fb950' : d.score >= 55 ? '#58a6ff' : d.score >= 40 ? '#f0b429' : '#f85149';
  const sigClass   = { strong_buy:'strong-buy', buy:'buy', hold:'hold', watch:'watch', sell:'sell' }[d.signal];
  const sigEmoji   = { strong_buy:'🔥', buy:'📈', hold:'➡️', watch:'⚠️', sell:'📉' }[d.signal];
  const barColor = p => p >= 70 ? '#3fb950' : p >= 45 ? '#58a6ff' : p >= 25 ? '#f0b429' : '#f85149';
  const compRows = ['trend','rsi','macd','volume'].map(k => {
    const c = d.components[k];
    const pct = Math.round(c.score / c.max * 100);
    return `<div class="comp-row">
      <span class="comp-name">${c.label}</span>
      <div class="comp-bar-wrap"><div class="comp-bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div>
      <span class="comp-score">${c.score}<span class="comp-max">/${c.max}</span></span>
    </div>`;
  }).join('');
  const tips = (d.tips || []).map(t => `<div class="tip-item">${esc(t)}</div>`).join('');
  card.innerHTML = `
    <div class="score-card-header">
      <span class="section-title" style="margin:0">綜合評分</span>
      <span style="font-size:11px;color:var(--muted)">技術指標綜合分析</span>
    </div>
    <div class="score-inner">
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 140 88">
          <circle cx="70" cy="78" r="50" fill="none" stroke="#30363d" stroke-width="9"
            stroke-dasharray="157 314" stroke-dashoffset="-157" stroke-linecap="round"/>
          <circle cx="70" cy="78" r="50" fill="none" stroke="${gaugeColor}" stroke-width="9"
            stroke-dasharray="${scoreArc} 314" stroke-dashoffset="-157" stroke-linecap="round"
            style="transition:stroke-dasharray .7s ease"/>
          <text x="70" y="68" text-anchor="middle" fill="#e6edf3" font-size="27" font-weight="700" font-family="system-ui,sans-serif">${d.score}</text>
          <text x="70" y="82" text-anchor="middle" fill="#8b949e" font-size="9" font-family="system-ui,sans-serif">/ 100</text>
        </svg>
        <div class="signal-badge ${sigClass}">${sigEmoji} ${d.signal_text}</div>
      </div>
      <div>
        <div class="comp-list">${compRows}</div>
        <div class="score-meta">
          <div class="meta-item"><span class="meta-label">年化波動</span><span class="meta-val">${d.volatility}%</span></div>
          <div class="meta-item"><span class="meta-label">風險等級</span><span class="risk-badge ${d.risk_key}">${d.risk_level}</span></div>
          <div class="meta-item"><span class="meta-label">止損參考</span><span class="meta-val down">${fmt(d.stop_loss)}</span></div>
          <div class="meta-item"><span class="meta-label">RSI(14)</span><span class="meta-val">${d.rsi_value}</span></div>
        </div>
        <div class="score-tips">${tips}</div>
      </div>
    </div>`;
}

async function loadScore(symbol) {
  const card = document.getElementById('scoreCard');
  if (!card) return;
  try {
    const r = await fetch(`/api/score?symbol=${encodeURIComponent(symbol)}`);
    const d = await r.json();
    if (d.error) { card.innerHTML = `<div style="color:var(--muted);padding:12px;font-size:13px">⚠️ ${esc(d.error)}</div>`; return; }
    fillScoreCard(card, d);
  } catch(e) {
    if (card) card.innerHTML = `<div style="color:var(--muted);padding:12px;font-size:13px">評分載入失敗</div>`;
  }
}

function chartThemeOpts(theme) {
  const l = theme === 'light';
  return {
    layout: { background: { type: 'solid', color: l ? '#ffffff' : '#1c2128' }, textColor: l ? '#656d76' : '#8b949e', fontSize: 11 },
    grid: { vertLines: { color: l ? '#00000009' : '#ffffff07' }, horzLines: { color: l ? '#00000009' : '#ffffff07' } },
    rightPriceScale: { borderColor: l ? '#d0d7de' : '#30363d' },
    timeScale: { borderColor: l ? '#d0d7de' : '#30363d' },
  };
}

function lwcChart(id, height, showTime) {
  const el = document.getElementById(id);
  if (!el) return null;
  return LightweightCharts.createChart(el, {
    width: el.offsetWidth || document.getElementById('chartPanels')?.offsetWidth || 800,
    height,
    ...chartThemeOpts(currentTheme),
    crosshair: { mode: 1 },
    timeScale: { ...chartThemeOpts(currentTheme).timeScale, timeVisible: true, secondsVisible: false, visible: showTime },
    handleScroll: true, handleScale: true,
  });
}

// ── Dynamic chart height distribution ──────────────────────
function calcChartHeights(activeSet) {
  const subCount = ['macd','rsi','kd'].filter(k => activeSet.has(k)).length;
  const volH  = 72;
  const subH  = [0, 108, 90, 80][Math.min(subCount, 3)];
  const avail = Math.min(680, Math.max(400, window.innerHeight - 440));
  const mainH = Math.max(180, avail - volH - subH * subCount);
  return { main: mainH, vol: volH, sub: subH };
}

function resizeCharts() {
  if (!CH.main) return;
  const h = calcChartHeights(CH.active);
  const setH = (id, px) => { const el = document.getElementById(id); if (el) el.style.height = px + 'px'; };
  setH('chartMain', h.main); CH.main.applyOptions({ height: h.main });
  setH('chartVol',  h.vol);  if (CH.vol)   CH.vol.applyOptions({ height: h.vol });
  setH('chartMacd', h.sub);  if (CH.macdC) CH.macdC.applyOptions({ height: h.sub });
  setH('chartRsi',  h.sub);  if (CH.rsiC)  CH.rsiC.applyOptions({ height: h.sub });
  setH('chartKd',   h.sub);  if (CH.kdC)   CH.kdC.applyOptions({ height: h.sub });
}

function calcMChartHeights(activeSet) {
  const subCount = ['macd','rsi','kd'].filter(k => activeSet.has(k)).length;
  const volH  = 72;
  const subH  = [0, 108, 90, 80][Math.min(subCount, 3)];
  const panel = document.getElementById('mChartPanel');
  const avail = Math.max(300, (panel ? panel.offsetHeight : 600) - 76); // 76 = chart-top + ohlcv-bar
  const mainH = Math.max(180, avail - volH - subH * subCount);
  return { main: mainH, vol: volH, sub: subH };
}

function resizeMCharts() {
  if (!MCH.main) return;
  const h = calcMChartHeights(MCH.active);
  const setH = (id, px) => { const el = document.getElementById(id); if (el) el.style.height = px + 'px'; };
  setH('m-chartMain', h.main); MCH.main.applyOptions({ height: h.main });
  setH('m-chartVol',  h.vol);  if (MCH.vol)   MCH.vol.applyOptions({ height: h.vol });
  setH('m-chartMacd', h.sub);  if (MCH.macdC) MCH.macdC.applyOptions({ height: h.sub });
  setH('m-chartRsi',  h.sub);  if (MCH.rsiC)  MCH.rsiC.applyOptions({ height: h.sub });
  setH('m-chartKd',   h.sub);  if (MCH.kdC)   MCH.kdC.applyOptions({ height: h.sub });
}

function destroyCharts() {
  ['main','vol','macdC','rsiC','kdC'].forEach(k => { try { if (CH[k]) CH[k].remove(); } catch(e) {} CH[k] = null; });
  CH.candles = null; CH.mas = {}; CH.bbU = CH.bbM = CH.bbL = null;
  CH.volS = CH.macdLine = CH.macdSig = CH.macdHist = CH.rsiS = CH.kS = CH.dS = null;
  if (CH.resObs) { CH.resObs.disconnect(); CH.resObs = null; }
}

function initCharts() {
  destroyCharts();
  const h = calcChartHeights(CH.active);
  document.getElementById('chartMain').style.height = h.main + 'px';

  // Main chart
  CH.main = lwcChart('chartMain', h.main, false);
  CH.candles = CH.main.addCandlestickSeries({ upColor:'#f85149', downColor:'#3fb950', borderUpColor:'#f85149', borderDownColor:'#3fb950', wickUpColor:'#f85149', wickDownColor:'#3fb950' });

  const maColors = { ma5:'#f0b429', ma10:'#58a6ff', ma20:'#f85149', ma60:'#a371f7' };
  Object.entries(maColors).forEach(([k, color]) => {
    CH.mas[k] = CH.main.addLineSeries({ color, lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false, visible: CH.active.has(k) });
  });

  const bbOpt = { lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false, visible: CH.active.has('bb') };
  CH.bbU = CH.main.addLineSeries({ ...bbOpt, color: '#58a6ff55', lineStyle: 2 });
  CH.bbM = CH.main.addLineSeries({ ...bbOpt, color: '#58a6ff',   lineStyle: 0 });
  CH.bbL = CH.main.addLineSeries({ ...bbOpt, color: '#58a6ff55', lineStyle: 2 });

  // Volume chart
  CH.vol  = lwcChart('chartVol', h.vol, false);
  CH.volS = CH.vol.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'vol' });
  CH.vol.priceScale('vol').applyOptions({ scaleMargins: { top: 0.1, bottom: 0 } });

  // Sub-charts
  if (CH.active.has('macd')) initMacdChart();
  if (CH.active.has('rsi'))  initRsiChart();
  if (CH.active.has('kd'))   initKdChart();

  setupSync();
  setupResize();

  // Crosshair → OHLCV bar
  CH.main.subscribeCrosshairMove(param => {
    if (!param.time || !param.seriesData) { showLastOhlcv(); return; }
    const c = param.seriesData.get(CH.candles);
    if (c) renderOhlcv(c, param.time);
  });
}

function initMacdChart() {
  const { sub } = calcChartHeights(CH.active);
  const el = document.getElementById('chartMacd'); if (el) el.style.height = sub + 'px';
  CH.macdC    = lwcChart('chartMacd', sub, false);
  CH.macdLine = CH.macdC.addLineSeries({ color:'#58a6ff', lineWidth:1, priceLineVisible:false, lastValueVisible:false });
  CH.macdSig  = CH.macdC.addLineSeries({ color:'#f0b429', lineWidth:1, priceLineVisible:false, lastValueVisible:false });
  CH.macdHist = CH.macdC.addHistogramSeries({ priceScaleId:'right', priceLineVisible:false, lastValueVisible:false });
}

function initRsiChart() {
  const { sub } = calcChartHeights(CH.active);
  const el = document.getElementById('chartRsi'); if (el) el.style.height = sub + 'px';
  CH.rsiC = lwcChart('chartRsi', sub, false);
  CH.rsiS = CH.rsiC.addLineSeries({ color:'#a371f7', lineWidth:1.5, priceLineVisible:false, lastValueVisible:true });
  [70, 30].forEach(lv => CH.rsiS.createPriceLine({ price:lv, color:lv===70?'#f85149':'#3fb950', lineWidth:1, lineStyle:2, axisLabelVisible:false }));
}

function initKdChart() {
  const { sub } = calcChartHeights(CH.active);
  const el = document.getElementById('chartKd'); if (el) el.style.height = sub + 'px';
  CH.kdC = lwcChart('chartKd', sub, true);
  CH.kS  = CH.kdC.addLineSeries({ color:'#f0b429', lineWidth:1.5, priceLineVisible:false, lastValueVisible:true });
  CH.dS  = CH.kdC.addLineSeries({ color:'#58a6ff', lineWidth:1.5, priceLineVisible:false, lastValueVisible:true });
  [80, 20].forEach(lv => CH.kS.createPriceLine({ price:lv, color:lv===80?'#f85149':'#3fb950', lineWidth:1, lineStyle:2, axisLabelVisible:false }));
}

function setupCrosshairSync(pairs) {
  const valid = pairs.filter(p => p.chart && p.series);
  if (valid.length < 2) return;
  let xSyncing = false;
  valid.forEach(({ chart: src }, i) => {
    src.subscribeCrosshairMove(param => {
      if (xSyncing) return;
      xSyncing = true;
      valid.forEach(({ chart: tgt, series }, j) => {
        if (i === j) return;
        if (!param.time) {
          try { tgt.clearCrosshairPosition(); } catch (e) {}
        } else {
          try {
            const bar = series.dataByIndex(Math.round(param.logical ?? 0), -1);
            const price = bar != null ? (bar.close ?? bar.value ?? NaN) : NaN;
            tgt.setCrosshairPosition(price, param.time, series);
          } catch (e) { try { tgt.clearCrosshairPosition(); } catch (_) {} }
        }
      });
      xSyncing = false;
    });
  });
}

function setupSync() {
  const all = [CH.main, CH.vol, CH.macdC, CH.rsiC, CH.kdC].filter(Boolean);
  all.forEach((src, i) => {
    src.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (CH.syncing || !range) return;
      CH.syncing = true;
      all.forEach((tgt, j) => { if (i !== j) tgt.timeScale().setVisibleLogicalRange(range); });
      CH.syncing = false;
    });
  });
  setupCrosshairSync([
    { chart: CH.main,  series: CH.candles  },
    { chart: CH.vol,   series: CH.volS     },
    { chart: CH.macdC, series: CH.macdLine },
    { chart: CH.rsiC,  series: CH.rsiS     },
    { chart: CH.kdC,   series: CH.kS       },
  ]);
}

function setupResize() {
  const panels = document.getElementById('chartPanels');
  if (!panels) return;
  CH.resObs = new ResizeObserver(() => {
    const w = panels.offsetWidth;
    [CH.main, CH.vol, CH.macdC, CH.rsiC, CH.kdC].forEach(c => { if (c) c.applyOptions({ width: w }); });
    resizeCharts();
  });
  CH.resObs.observe(panels);
}

async function loadChartData(symbol) {
  const spinner = document.getElementById('chartSpinner');
  if (spinner) spinner.style.display = 'block';
  try {
    const r = await fetch(`/api/chart?symbol=${encodeURIComponent(symbol)}&period=${CH.period}&interval=${CH.interval}`);
    const data = await r.json();
    if (data.error) { showToast('圖表錯誤：' + data.error); return; }
    CH.data = data;
    applyChartData(data);
    showLastOhlcv();
  } catch(e) {
    showToast('圖表載入失敗');
  } finally {
    if (spinner) spinner.style.display = 'none';
  }
}

function applyChartData(d) {
  if (!CH.candles) return;
  CH.candles.applyOptions(candleColors(currentSymbol));
  CH.candles.setData(d.candles);
  ['ma5','ma10','ma20','ma60'].forEach(k => { if (CH.mas[k] && d.ma[k.replace('ma','')]) CH.mas[k].setData(d.ma[k.replace('ma','')]); });
  if (d.bb) { CH.bbU.setData(d.bb.upper); CH.bbM.setData(d.bb.mid); CH.bbL.setData(d.bb.lower); }
  if (CH.volS && d.volume) CH.volS.setData(d.volume);
  if (CH.macdLine && d.macd) { CH.macdLine.setData(d.macd.line); CH.macdSig.setData(d.macd.signal); CH.macdHist.setData(d.macd.hist); }
  if (CH.rsiS && d.rsi) CH.rsiS.setData(d.rsi);
  if (CH.kS && d.kd) { CH.kS.setData(d.kd.k); CH.dS.setData(d.kd.d); }
  CH.main.timeScale().scrollToRealTime();
}

function renderOhlcv(c, time) {
  const bar = document.getElementById('ohlcvBar');
  if (!bar || !c) return;
  const chg = c.close - c.open;
  const cls = chgCls(chg >= 0);
  const hiCls = chgCls(true);
  const loCls = chgCls(false);
  const sign = chg >= 0 ? '+' : '';
  bar.innerHTML = `
    <span style="color:var(--muted);font-size:11px">${time}</span>
    <span><span class="ohlcv-lbl">開</span><span class="${cls}">${fmt(c.open)}</span></span>
    <span><span class="ohlcv-lbl">高</span><span class="${hiCls}">${fmt(c.high)}</span></span>
    <span><span class="ohlcv-lbl">低</span><span class="${loCls}">${fmt(c.low)}</span></span>
    <span><span class="ohlcv-lbl">收</span><span class="${cls}">${fmt(c.close)}</span></span>
    <span class="${cls}">${sign}${fmt(chg)} (${sign}${((chg/c.open)*100).toFixed(2)}%)</span>`;
}

function showLastOhlcv() {
  if (CH.data && CH.data.candles.length > 0) {
    const last = CH.data.candles[CH.data.candles.length - 1];
    renderOhlcv(last, last.time);
  }
}

function toggleIndicator(ind) {
  const isActive = CH.active.has(ind);
  isActive ? CH.active.delete(ind) : CH.active.add(ind);
  const btn = document.querySelector(`[data-ind="${ind}"]`);
  if (btn) btn.classList.toggle('active', CH.active.has(ind));

  if (['macd','rsi','kd'].includes(ind)) {
    const panelMap = { macd:'panelMacd', rsi:'panelRsi', kd:'panelKd' };
    const panel = document.getElementById(panelMap[ind]);
    if (isActive) {
      if (panel) panel.style.display = 'none';
      const cMap = { macd:'macdC', rsi:'rsiC', kd:'kdC' };
      if (CH[cMap[ind]]) { try { CH[cMap[ind]].remove(); } catch(e) {} CH[cMap[ind]] = null; }
      if (ind === 'macd') { CH.macdLine = CH.macdSig = CH.macdHist = null; }
      if (ind === 'rsi')  { CH.rsiS = null; }
      if (ind === 'kd')   { CH.kS = CH.dS = null; }
      resizeCharts();
    } else {
      if (panel) panel.style.display = 'block';
      if (ind === 'macd') initMacdChart();
      if (ind === 'rsi')  initRsiChart();
      if (ind === 'kd')   initKdChart();
      resizeCharts();
      if (CH.data) {
        if (ind === 'macd' && CH.macdLine) { CH.macdLine.setData(CH.data.macd.line); CH.macdSig.setData(CH.data.macd.signal); CH.macdHist.setData(CH.data.macd.hist); }
        if (ind === 'rsi'  && CH.rsiS) CH.rsiS.setData(CH.data.rsi);
        if (ind === 'kd'   && CH.kS)   { CH.kS.setData(CH.data.kd.k); CH.dS.setData(CH.data.kd.d); }
      }
      setupSync();
      const range = CH.main?.timeScale().getVisibleLogicalRange();
      const newC = { macd: CH.macdC, rsi: CH.rsiC, kd: CH.kdC }[ind];
      if (range && newC) newC.timeScale().setVisibleLogicalRange(range);
    }
  } else {
    if (ind === 'bb') {
      const v = CH.active.has('bb');
      [CH.bbU, CH.bbM, CH.bbL].forEach(s => { if (s) s.applyOptions({ visible: v }); });
    } else {
      const s = CH.mas[ind];
      if (s) s.applyOptions({ visible: CH.active.has(ind) });
    }
  }
}

// ═══ Theme ══════════════════════════════════════════════════
function applyTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  const btn = document.getElementById('btnTheme');
  if (btn) btn.textContent = theme === 'light' ? '🌙' : '☀️';
  const opts = chartThemeOpts(theme);
  ['main','vol','macdC','rsiC','kdC'].forEach(k => {
    if (CH[k])  try { CH[k].applyOptions(opts);  } catch(e) {}
    if (MCH[k]) try { MCH[k].applyOptions(opts); } catch(e) {}
  });
}

function toggleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }

// ═══ Sidebar (mobile) ═══════════════════════════════════════
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function closeSidebar() {
