}

// ═══ Helpers ════════════════════════════════════════════════
function fmt(n) {
  if (n == null) return '--';
  return Number(n).toLocaleString('zh-TW', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
}
function fmtVol(n) {
  if (n == null) return '--';
  if (n >= 1e8) return (n/1e8).toFixed(2) + ' 億';
  if (n >= 1e4) return (n/1e4).toFixed(2) + ' 萬';
  return n.toLocaleString();
}
function fmtCap(n) {
  if (n == null) return '--';
  if (n >= 1e12) return (n/1e12).toFixed(2) + ' 兆';
  if (n >= 1e8)  return (n/1e8).toFixed(2) + ' 億';
  if (n >= 1e4)  return (n/1e4).toFixed(2) + ' 萬';
  return n.toLocaleString();
}
function getMarketLabel(sym) {
  if (sym.endsWith('.TW')) return '台灣';
  if (sym.endsWith('.HK')) return '香港';
  return '美國';
}
function chgCls(isGain) {
  return isGain ? 'up' : 'down';
}
function candleColors() {
  return { upColor:'#f85149', downColor:'#3fb950', borderUpColor:'#f85149', borderDownColor:'#3fb950', wickUpColor:'#f85149', wickDownColor:'#3fb950' };
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══ Phase 4 — Stock Modal ═══════════════════════════════════
const MCH = {
  main:null, vol:null, macdC:null, rsiC:null, kdC:null,
  candles:null, mas:{}, bbU:null, bbM:null, bbL:null,
  volS:null, macdLine:null, macdSig:null, macdHist:null,
  rsiS:null, kS:null, dS:null,
  period:'3mo', interval:'1d',
  active: new Set(['ma5','ma10','ma20']),
  syncing:false, data:null, resObs:null, symbol:null,
};

let mChartInited = false;

function openStockModal(symbol) {
  MCH.symbol = symbol;
  mChartInited = false;
  const modal = document.getElementById('stockModal');
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  document.getElementById('modalHdrTitle').textContent = symbol;
  document.getElementById('modalHdrSub').textContent = '';
  document.getElementById('modalTabs').style.display = 'none';
  document.getElementById('mInfoPanel').innerHTML =
    `<div class="state-box"><div class="spinner"></div><div class="state-desc">正在取得 ${esc(symbol)} 資料...</div></div>`;
  document.getElementById('mChartPanel').style.display = 'none';
  document.getElementById('mInfoPanel').style.display = 'flex';

  fetch(`/api/quote?symbol=${encodeURIComponent(symbol)}`)
    .then(r => r.json())
    .then(d => {
      if (d.error) {
        document.getElementById('mInfoPanel').innerHTML =
          `<div class="state-box error"><div class="state-icon">⚠️</div><div class="state-title">查詢失敗</div><div class="state-desc">${esc(d.error)}</div></div>`;
        return;
      }
      renderModalContent(d);
    })
    .catch(() => {
      document.getElementById('mInfoPanel').innerHTML =
        `<div class="state-box error"><div class="state-icon">⚠️</div><div class="state-title">查詢失敗</div><div class="state-desc">網路連線失敗</div></div>`;
    });
}

function closeStockModal() {
  document.getElementById('stockModal').style.display = 'none';
  document.body.style.overflow = '';
  destroyModalCharts();
  MCH.symbol = null; MCH.data = null; mChartInited = false;
}

function handleModalBg(e) { if (e.target === document.getElementById('stockModal')) closeStockModal(); }

function switchModalTab(tab) {
  document.querySelectorAll('.modal-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const infoPanel  = document.getElementById('mInfoPanel');
  const chartPanel = document.getElementById('mChartPanel');
  if (tab === 'info') {
    infoPanel.style.display  = 'flex';
    chartPanel.style.display = 'none';
  } else {
    infoPanel.style.display  = 'none';
    chartPanel.style.display = 'flex';
    if (!mChartInited) {
      mChartInited = true;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        initModalCharts();
        if (MCH.symbol) loadModalChartData(MCH.symbol);
      }));
    }
  }
}

function renderModalContent(d) {
  document.getElementById('modalHdrTitle').textContent = d.symbol;
  document.getElementById('modalHdrSub').textContent   = d.name;
  document.getElementById('modalTabs').style.display   = 'flex';

  // ── Info tab ─────────────────────────────────────────────
  const isUp = d.change >= 0, cls = chgCls(isUp), sign = isUp ? '+' : '';
  const market = getMarketLabel(d.symbol);
  const inWL = watchlist.some(w => w.symbol === d.symbol);

  document.getElementById('mInfoPanel').innerHTML = `
    <div class="quote-card">
      <div class="quote-top">
        <div>
          <div class="quote-name-row">
            <span class="quote-symbol">${esc(d.symbol)}</span>
            <span class="market-badge">${market}</span>
          </div>
          <div class="quote-company">${esc(d.name)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="quote-date">更新：${d.date}</div>
          <button class="btn-add-wl ${inWL?'added':''}" id="mBtnAddWL" onclick="toggleModalWL('${esc(d.symbol)}')">
            ${inWL ? '✓ 已加入自選' : '+ 加入自選'}
          </button>
        </div>
      </div>
      <div class="price-section">
        <span class="price-main ${cls}">${fmt(d.price)}</span>
        <span class="price-change ${cls}">${sign}${fmt(d.change)} (${sign}${fmt(d.change_pct)}%)</span>
        <span class="price-currency">${d.currency}</span>
      </div>
      <div class="section-title">今日行情</div>
      <div class="metrics-grid">
        ${metric('開盤',fmt(d.open))}${metric('最高',fmt(d.high),'up')}${metric('最低',fmt(d.low),'down')}
        ${metric('收盤',fmt(d.close))}${metric('前收',fmt(d.prev_close))}${metric('成交量',fmtVol(d.volume))}
        ${d.year_high!=null?metric('52週高',fmt(d.year_high),'up'):''}
        ${d.year_low !=null?metric('52週低', fmt(d.year_low),'down'):''}
        ${d.market_cap!=null?metric('市值',fmtCap(d.market_cap)):''}
      </div>
    </div>
    <div class="score-card" id="m-scoreCard">
      <div class="score-loading"><div class="spinner" style="width:18px;height:18px;border-width:2px"></div><span>計算評分中...</span></div>
    </div>`;

  loadModalScore(d.symbol);

  // ── Chart tab ─────────────────────────────────────────────
  document.getElementById('mChartPanel').innerHTML = buildModalChartHTML();

  document.querySelectorAll('.m-period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.m-period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      MCH.period = btn.dataset.period; MCH.interval = btn.dataset.interval;
      if (MCH.symbol && mChartInited) loadModalChartData(MCH.symbol);
    });
  });
  document.querySelectorAll('.m-ind-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleModalIndicator(btn.dataset.ind));
  });
}

function toggleModalWL(symbol) {
  const idx = watchlist.findIndex(w => w.symbol === symbol);
  if (idx >= 0) { watchlist.splice(idx, 1); showToast('已從自選股移除'); }
  else {
    const g = activeWlGroup === '全部' ? (wlGroups[0] || '預設') : activeWlGroup;
    watchlist.push({ symbol, name:'', price:null, change_pct:null, group: g });
    showToast('已加入自選股');
  }
  saveWatchlist(); renderWatchlist();
  const btn = document.getElementById('mBtnAddWL');
  if (btn) { const inWL = watchlist.some(w => w.symbol === symbol); btn.textContent = inWL ? '✓ 已加入自選' : '+ 加入自選'; btn.className = 'btn-add-wl' + (inWL ? ' added' : ''); }
}

// ── Modal Chart ──────────────────────────────────────────────
function buildModalChartHTML() {
  const pBtns = PERIODS.map(p => {
    const act = (p.period===MCH.period && p.interval===MCH.interval) ? 'active' : '';
    return `<button class="ctrl-btn m-period-btn ${act}" data-period="${p.period}" data-interval="${p.interval}">${p.label}</button>`;
  }).join('');
  const iBtns = INDS.map(i => {
    if (!i) return '<div class="ctrl-sep-v"></div>';
    return `<button class="ctrl-btn m-ind-btn ${MCH.active.has(i.id)?'active':''}" data-ind="${i.id}">${i.label}</button>`;
  }).join('');
  const vis = id => MCH.active.has(id) ? 'block' : 'none';
  return `
    <div class="chart-card">
      <div class="chart-top">
        <div style="display:flex;gap:4px;flex-wrap:wrap">${pBtns}</div>
        <div class="ctrl-sep-v"></div>
        <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">${iBtns}</div>
        <div class="chart-spinner-wrap"><div id="m-chartSpinner" class="mini-spinner" style="display:none"></div></div>
      </div>
      <div id="m-ohlcvBar" class="ohlcv-bar"><span style="color:var(--muted);font-size:11px">將滑鼠移至圖表上查看資料</span></div>
      <div id="m-chartPanels">
        <div><div id="m-chartMain" class="chart-div" style="height:${calcMChartHeights(MCH.active).main}px"></div></div>
        <div class="chart-panel"><div class="panel-label">VOL</div><div id="m-chartVol" class="chart-div" style="height:72px"></div></div>
        <div id="m-panelMacd" class="chart-panel" style="display:${vis('macd')}">
          <div class="panel-label">MACD (12,26,9)</div><div id="m-chartMacd" class="chart-div" style="height:${calcMChartHeights(MCH.active).sub}px"></div>
        </div>
        <div id="m-panelRsi" class="chart-panel" style="display:${vis('rsi')}">
          <div class="panel-label">RSI (14)</div><div id="m-chartRsi" class="chart-div" style="height:${calcMChartHeights(MCH.active).sub}px"></div>
        </div>
        <div id="m-panelKd" class="chart-panel" style="display:${vis('kd')}">
          <div class="panel-label">KD (9,3,3)</div><div id="m-chartKd" class="chart-div" style="height:${calcMChartHeights(MCH.active).sub}px"></div>
        </div>
      </div>
    </div>`;
}

function destroyModalCharts() {
  ['main','vol','macdC','rsiC','kdC'].forEach(k => { try { if (MCH[k]) MCH[k].remove(); } catch(e){} MCH[k]=null; });
  MCH.candles=null; MCH.mas={}; MCH.bbU=MCH.bbM=MCH.bbL=null;
  MCH.volS=MCH.macdLine=MCH.macdSig=MCH.macdHist=MCH.rsiS=MCH.kS=MCH.dS=null;
  if (MCH.resObs) { MCH.resObs.disconnect(); MCH.resObs=null; }
}

function initModalCharts() {
  destroyModalCharts();
  const h = calcMChartHeights(MCH.active);
  document.getElementById('m-chartMain').style.height = h.main + 'px';
  MCH.main = lwcChart('m-chartMain', h.main, false);
  if (!MCH.main) return;
  MCH.candles = MCH.main.addCandlestickSeries({ upColor:'#f85149', downColor:'#3fb950', borderUpColor:'#f85149', borderDownColor:'#3fb950', wickUpColor:'#f85149', wickDownColor:'#3fb950' });
  const maColors = { ma5:'#f0b429', ma10:'#58a6ff', ma20:'#f85149', ma60:'#a371f7' };
  Object.entries(maColors).forEach(([k, color]) => {
    MCH.mas[k] = MCH.main.addLineSeries({ color, lineWidth:1, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false, visible:MCH.active.has(k) });
  });
  const bbO = { lineWidth:1, priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false, visible:MCH.active.has('bb') };
  MCH.bbU = MCH.main.addLineSeries({ ...bbO, color:'#58a6ff55', lineStyle:2 });
  MCH.bbM = MCH.main.addLineSeries({ ...bbO, color:'#58a6ff',   lineStyle:0 });
  MCH.bbL = MCH.main.addLineSeries({ ...bbO, color:'#58a6ff55', lineStyle:2 });
  MCH.vol  = lwcChart('m-chartVol', h.vol, false);
  if (MCH.vol) { MCH.volS = MCH.vol.addHistogramSeries({ priceFormat:{type:'volume'}, priceScaleId:'vol' }); MCH.vol.priceScale('vol').applyOptions({ scaleMargins:{top:0.1,bottom:0} }); }
  if (MCH.active.has('macd')) initMCH_Macd();
  if (MCH.active.has('rsi'))  initMCH_Rsi();
  if (MCH.active.has('kd'))   initMCH_Kd();
  setupModalSync(); setupModalResize();
  MCH.main.subscribeCrosshairMove(param => {
    if (!param.time || !param.seriesData) { showLastModalOhlcv(); return; }
    const c = param.seriesData.get(MCH.candles);
    if (c) renderModalOhlcv(c, param.time);
  });
}

function initMCH_Macd() {
  const { sub } = calcMChartHeights(MCH.active);
  const el = document.getElementById('m-chartMacd'); if (el) el.style.height = sub + 'px';
  MCH.macdC    = lwcChart('m-chartMacd', sub, false); if (!MCH.macdC) return;
  MCH.macdLine = MCH.macdC.addLineSeries({ color:'#58a6ff', lineWidth:1, priceLineVisible:false, lastValueVisible:false });
  MCH.macdSig  = MCH.macdC.addLineSeries({ color:'#f0b429', lineWidth:1, priceLineVisible:false, lastValueVisible:false });
  MCH.macdHist = MCH.macdC.addHistogramSeries({ priceScaleId:'right', priceLineVisible:false, lastValueVisible:false });
}
function initMCH_Rsi() {
  const { sub } = calcMChartHeights(MCH.active);
  const el = document.getElementById('m-chartRsi'); if (el) el.style.height = sub + 'px';
  MCH.rsiC = lwcChart('m-chartRsi', sub, false); if (!MCH.rsiC) return;
  MCH.rsiS = MCH.rsiC.addLineSeries({ color:'#a371f7', lineWidth:1.5, priceLineVisible:false, lastValueVisible:true });
  [70,30].forEach(lv => MCH.rsiS.createPriceLine({ price:lv, color:lv===70?'#f85149':'#3fb950', lineWidth:1, lineStyle:2, axisLabelVisible:false }));
}
function initMCH_Kd() {
  const { sub } = calcMChartHeights(MCH.active);
  const el = document.getElementById('m-chartKd'); if (el) el.style.height = sub + 'px';
  MCH.kdC = lwcChart('m-chartKd', sub, true); if (!MCH.kdC) return;
  MCH.kS = MCH.kdC.addLineSeries({ color:'#f0b429', lineWidth:1.5, priceLineVisible:false, lastValueVisible:true });
  MCH.dS = MCH.kdC.addLineSeries({ color:'#58a6ff', lineWidth:1.5, priceLineVisible:false, lastValueVisible:true });
  [80,20].forEach(lv => MCH.kS.createPriceLine({ price:lv, color:lv===80?'#f85149':'#3fb950', lineWidth:1, lineStyle:2, axisLabelVisible:false }));
}

function setupModalSync() {
  const all = [MCH.main, MCH.vol, MCH.macdC, MCH.rsiC, MCH.kdC].filter(Boolean);
  all.forEach((src, i) => {
    src.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (MCH.syncing || !range) return;
      MCH.syncing = true;
      all.forEach((tgt, j) => { if (i!==j) tgt.timeScale().setVisibleLogicalRange(range); });
      MCH.syncing = false;
    });
  });
  setupCrosshairSync([
    { chart: MCH.main,  series: MCH.candles  },
    { chart: MCH.vol,   series: MCH.volS     },
    { chart: MCH.macdC, series: MCH.macdLine },
    { chart: MCH.rsiC,  series: MCH.rsiS     },
    { chart: MCH.kdC,   series: MCH.kS       },
  ]);
}

function setupModalResize() {
  const panels = document.getElementById('m-chartPanels');
  if (!panels) return;
  MCH.resObs = new ResizeObserver(() => {
    const w = panels.offsetWidth;
    [MCH.main, MCH.vol, MCH.macdC, MCH.rsiC, MCH.kdC].forEach(c => { if (c) c.applyOptions({ width:w }); });
  });
  MCH.resObs.observe(panels);
}

async function loadModalChartData(symbol) {
  const spinner = document.getElementById('m-chartSpinner');
  if (spinner) spinner.style.display = 'block';
  try {
    const r = await fetch(`/api/chart?symbol=${encodeURIComponent(symbol)}&period=${MCH.period}&interval=${MCH.interval}`);
    const data = await r.json();
    if (data.error) { showToast('圖表錯誤：' + data.error); return; }
    MCH.data = data; applyModalChartData(data); showLastModalOhlcv();
  } catch(e) { showToast('圖表載入失敗'); }
  finally { if (spinner) spinner.style.display = 'none'; }
}

function applyModalChartData(d) {
  if (!MCH.candles) return;
  MCH.candles.applyOptions(candleColors(MCH.symbol));
  MCH.candles.setData(d.candles);
  ['ma5','ma10','ma20','ma60'].forEach(k => { if (MCH.mas[k] && d.ma[k.replace('ma','')]) MCH.mas[k].setData(d.ma[k.replace('ma','')]); });
  if (d.bb) { MCH.bbU.setData(d.bb.upper); MCH.bbM.setData(d.bb.mid); MCH.bbL.setData(d.bb.lower); }
  if (MCH.volS && d.volume) MCH.volS.setData(d.volume);
  if (MCH.macdLine && d.macd) { MCH.macdLine.setData(d.macd.line); MCH.macdSig.setData(d.macd.signal); MCH.macdHist.setData(d.macd.hist); }
  if (MCH.rsiS && d.rsi) MCH.rsiS.setData(d.rsi);
  if (MCH.kS && d.kd) { MCH.kS.setData(d.kd.k); MCH.dS.setData(d.kd.d); }
  MCH.main.timeScale().scrollToRealTime();
}

function renderModalOhlcv(c, time) {
  const bar = document.getElementById('m-ohlcvBar'); if (!bar || !c) return;
  const chg = c.close - c.open, cls = chgCls(chg>=0), sign = chg>=0?'+':'';
  const hiCls = chgCls(true), loCls = chgCls(false);
  bar.innerHTML = `<span style="color:var(--muted);font-size:11px">${time}</span>
    <span><span class="ohlcv-lbl">開</span><span class="${cls}">${fmt(c.open)}</span></span>
    <span><span class="ohlcv-lbl">高</span><span class="${hiCls}">${fmt(c.high)}</span></span>
    <span><span class="ohlcv-lbl">低</span><span class="${loCls}">${fmt(c.low)}</span></span>
    <span><span class="ohlcv-lbl">收</span><span class="${cls}">${fmt(c.close)}</span></span>
    <span class="${cls}">${sign}${fmt(chg)} (${sign}${((chg/c.open)*100).toFixed(2)}%)</span>`;

function toggleModalIndicator(ind) {
  const isActive = MCH.active.has(ind);
  isActive ? MCH.active.delete(ind) : MCH.active.add(ind);
  const btn = document.querySelector(`.m-ind-btn[data-ind="${ind}"]`);
  if (btn) btn.classList.toggle('active', MCH.active.has(ind));
  if (['macd','rsi','kd'].includes(ind)) {
    const pMap = { macd:'m-panelMacd', rsi:'m-panelRsi', kd:'m-panelKd' };
    const panel = document.getElementById(pMap[ind]);
    if (isActive) {
      if (panel) panel.style.display = 'none';
      const cMap = { macd:'macdC', rsi:'rsiC', kd:'kdC' };
      if (MCH[cMap[ind]]) { try { MCH[cMap[ind]].remove(); } catch(e){} MCH[cMap[ind]]=null; }
      if (ind==='macd') MCH.macdLine=MCH.macdSig=MCH.macdHist=null;
      if (ind==='rsi')  MCH.rsiS=null;
      if (ind==='kd')   MCH.kS=MCH.dS=null;
      resizeMCharts();
    } else {
      if (panel) panel.style.display = 'block';
      if (ind==='macd') initMCH_Macd();
      if (ind==='rsi')  initMCH_Rsi();
      if (ind==='kd')   initMCH_Kd();
      resizeMCharts();
      if (MCH.data) {
        if (ind==='macd' && MCH.macdLine) { MCH.macdLine.setData(MCH.data.macd.line); MCH.macdSig.setData(MCH.data.macd.signal); MCH.macdHist.setData(MCH.data.macd.hist); }
        if (ind==='rsi'  && MCH.rsiS) MCH.rsiS.setData(MCH.data.rsi);
        if (ind==='kd'   && MCH.kS)   { MCH.kS.setData(MCH.data.kd.k); MCH.dS.setData(MCH.data.kd.d); }
      }
      setupModalSync();
      const range = MCH.main?.timeScale().getVisibleLogicalRange();
      const newC = { macd:MCH.macdC, rsi:MCH.rsiC, kd:MCH.kdC }[ind];
      if (range && newC) newC.timeScale().setVisibleLogicalRange(range);
    }
  } else {
    if (ind==='bb') { const v=MCH.active.has('bb'); [MCH.bbU,MCH.bbM,MCH.bbL].forEach(s=>{ if(s) s.applyOptions({visible:v}); }); }
    else { const s=MCH.mas[ind]; if(s) s.applyOptions({visible:MCH.active.has(ind)}); }
  }
}

function renderStratDetail(stratId) {
  const det  = document.getElementById('stratDetail');
  const meta = STRAT_META[stratId];
  if (!det || !meta) return;

  const logicItems = meta.logic.map(l =>
    `<div class="strat-logic-item">${esc(l)}</div>`).join('');

  const paramRows = meta.params.map(p => {
    const cur = stratParams[stratId]?.[p.key] ?? p.default;
    const displayVal = p.scale ? Math.round(cur / p.scale) : cur;
    return `
      <div class="strat-param-row">
        <span class="strat-param-label">${p.label}</span>
        <input type="range" class="strat-param-range"
          min="${p.min}" max="${p.max}" step="${p.step}" value="${displayVal}"
          data-sid="${stratId}" data-key="${p.key}"
          oninput="updateParam(this)">
        <span class="strat-param-val" id="pval-${stratId}-${p.key}">${displayVal}${p.unit}</span>
        <input type="number" class="strat-param-num"
          min="${p.min}" max="${p.max}" step="${p.step}" value="${displayVal}"
          data-sid="${stratId}" data-key="${p.key}"
          oninput="updateParamNum(this)">
      </div>`;
  }).join('');

  det.innerHTML = `
    <div class="strat-detail-box">
      <div class="strat-detail-desc">${esc(meta.desc)}</div>
      <div class="strat-logic">${logicItems}</div>
      ${paramRows ? `<div class="strat-param-title">參數調整</div><div class="strat-params">${paramRows}</div>` : ''}
    </div>`;
}

function updateParam(el) {
  const { sid, key } = el.dataset;
  const meta = STRAT_META[sid]?.params.find(p => p.key === key);
  const displayVal = parseFloat(el.value);
  const storeVal   = meta?.scale ? displayVal * meta.scale : displayVal;
  stratParams[sid][key] = storeVal;
  const disp = document.getElementById(`pval-${sid}-${key}`);
  if (disp) disp.textContent = displayVal + (meta?.unit || '');
  const num = document.querySelector(`input[type=number][data-sid="${sid}"][data-key="${key}"]`);
  if (num) num.value = displayVal;
}

function updateParamNum(el) {
  const { sid, key } = el.dataset;
  const meta = STRAT_META[sid]?.params.find(p => p.key === key);
  let displayVal = parseFloat(el.value);
  if (meta) displayVal = Math.min(meta.max, Math.max(meta.min, displayVal || meta.default));
  const storeVal = meta?.scale ? displayVal * meta.scale : displayVal;
  stratParams[sid][key] = storeVal;
  const disp = document.getElementById(`pval-${sid}-${key}`);
  if (disp) disp.textContent = displayVal + (meta?.unit || '');
  const range = document.querySelector(`input[type=range][data-sid="${sid}"][data-key="${key}"]`);
  if (range) range.value = displayVal;
}

async function runScan() {
  const rawVal = document.getElementById('scanSymbols')?.value?.trim();
  if (!rawVal) { showToast('請輸入股票代號'); return; }

  const btn       = document.getElementById('btnRunScan');
  const hint      = document.getElementById('scanHint');
  const resultsDiv = document.getElementById('scanResults');

  btn.disabled = true;
  hint.textContent = '掃描中，請稍候...';
  resultsDiv.innerHTML = `<div class="scan-empty"><div class="spinner" style="width:24px;height:24px;border-width:2px;margin:0 auto 12px"></div>正在分析股票...</div>`;

  try {
    const params = new URLSearchParams({ symbols: rawVal, strategy: scanStrategy });
    const p = stratParams[scanStrategy] || {};
    Object.entries(p).forEach(([k, v]) => params.append(k, v));
    const r    = await fetch(`/api/scan?${params}`);
    const data = await r.json();
    if (data.error) {
      showToast(data.error);
      resultsDiv.innerHTML = `<div class="scan-empty">⚠️ ${esc(data.error)}</div>`;
      return;
    }
    renderScanResults(data);
    hint.textContent = `共分析 ${data.total} 檔，符合策略 ${data.matched} 檔`;
  } catch(e) {
    resultsDiv.innerHTML = `<div class="scan-empty">⚠️ 掃描失敗，請確認伺服器連線</div>`;
    hint.textContent = '掃描失敗';
  } finally {
    btn.disabled = false;
  }
}

function renderScanResults(data) {
  lastScanData = data;
  const resultsDiv = document.getElementById('scanResults');
  if (!resultsDiv) return;

  if (!data.results || data.results.length === 0) {
    resultsDiv.innerHTML = `<div class="scan-results-card"><div class="scan-empty">未找到任何結果<br>請嘗試更換策略或增加股票代號</div></div>`;
    return;
  }

  const stratName = STRATEGIES.find(s => s.id === data.strategy)?.name || data.strategy;
  const failedHtml = data.failed?.length
    ? `<span style="font-size:11px;color:var(--muted)">無法取得：${data.failed.join(', ')}</span>` : '';

  const rows = data.results.map(r => {
    const isUp  = (r.change_pct ?? 0) >= 0;
    const cls   = chgCls(isUp);
    const sign  = isUp ? '+' : '';
    const dot   = r.strat_match
      ? `<span class="match-dot yes"></span>`
      : `<span class="match-dot no"></span>`;
    const scoreColor = r.score >= 75 ? '#3fb950' : r.score >= 55 ? '#58a6ff' : r.score >= 40 ? '#f0b429' : '#f85149';
    const sigColor   = r.score >= 75 ? '#3fb950' : r.score >= 55 ? '#58a6ff' : r.score >= 40 ? '#f0b429' : '#f85149';
    const rsiColor   = r.rsi > 70 ? '#f85149' : r.rsi < 30 ? '#3fb950' : 'var(--text)';

    const stratColor = r.strat_score >= 80 ? '#3fb950' : r.strat_score >= 50 ? '#58a6ff' : 'var(--muted)';
    return `
      <tr onclick="loadQuoteFromScan('${esc(r.symbol)}')">
        <td>${dot}<strong>${esc(r.symbol)}</strong></td>
        <td style="color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis">${esc(r.name)}</td>
        <td class="r">${r.price != null ? fmt(r.price) : '--'}</td>
        <td class="r ${cls}">${r.change_pct != null ? sign + fmt(r.change_pct) + '%' : '--'}</td>
        <td class="r" style="color:${stratColor};font-weight:700">${r.strat_score}</td>
        <td class="r" style="color:${scoreColor}">${r.score}</td>
        <td class="r" style="color:${sigColor}">${esc(r.signal)}</td>
        <td class="r" style="color:${rsiColor}">${r.rsi != null ? r.rsi : '--'}</td>
      </tr>`;
  }).join('');

  resultsDiv.innerHTML = `
    <div class="scan-results-card">
      <div class="scan-results-header">
        <div class="scan-summary">
          <div class="scan-stat">
            <span class="scan-stat-val">${data.results.length}</span>
            <span class="scan-stat-lbl">分析完成</span>
          </div>
          <div class="scan-stat">
            <span class="scan-stat-val up">${data.matched}</span>
            <span class="scan-stat-lbl">符合策略</span>
          </div>
          <div class="scan-stat">
            <span class="scan-stat-val" style="color:var(--muted)">${data.failed?.length || 0}</span>
            <span class="scan-stat-lbl">查詢失敗</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--muted)">策略：${stratName}</span>
            <button class="btn-csv" onclick="exportScanCSV()">↓ 匯出 CSV</button>
          </div>
          ${failedHtml}
        </div>
      </div>
      <div class="result-table-wrap">
        <table class="result-table">
          <thead>
            <tr>
              <th>代號</th>
              <th>名稱</th>
              <th class="r">股價</th>
              <th class="r">漲跌%</th>
              <th class="r">策略分</th>
              <th class="r">綜合分</th>
              <th class="r">信號</th>
              <th class="r">RSI</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function exportScanCSV() {
  if (!lastScanData?.results?.length) { showToast('尚無掃描結果可匯出'); return; }
  const strat = STRATEGIES.find(s => s.id === lastScanData.strategy)?.name || lastScanData.strategy;
  const header = ['代號','名稱','股價','漲跌%','策略分','綜合分','信號','RSI','策略'];
  const rows = lastScanData.results.map(r => [
    r.symbol, r.name, r.price ?? '', r.change_pct ?? '',
    r.strat_score, r.score, r.signal_text ?? r.signal, r.rsi ?? '', strat
  ]);
  const csv = [header, ...rows]
    .map(r => r.map(v => `"${String(v ?? '').replace(/"/g,'""')}"`).join(','))
    .join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `scan_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV 已下載');
}

  if (!panel.dataset.loaded) loadMarketData(false);
}

async function loadMarketData(force) {
  const panel = document.getElementById('marketPanel');
  panel.innerHTML = `<div class="state-box"><div class="spinner"></div><div class="state-desc">正在取得市場資料...</div></div>`;
  delete panel.dataset.loaded;
  try {
    const r    = await fetch(`/api/market${force ? '?force=1' : ''}`);
    const data = await r.json();
    if (data.error) {
      panel.innerHTML = `<div class="state-box error"><div class="state-icon">⚠️</div><div class="state-title">載入失敗</div><div class="state-desc">${esc(data.error)}</div></div>`;
      return;
    }
    renderMarket(data);
    panel.dataset.loaded = '1';
  } catch(e) {
    panel.innerHTML = `<div class="state-box error"><div class="state-icon">⚠️</div><div class="state-title">載入失敗</div><div class="state-desc">無法連接伺服器</div></div>`;
  }
}

async function refreshMarket() {
  const btn = document.getElementById('btnRefreshMarket');
  if (btn) { btn.disabled = true; btn.textContent = '⟳ 更新中...'; }
  await loadMarketData(true);
}

function getSentimentColor(key) {
  return { extreme_greed:'#3fb950', greed:'#58a6ff', neutral:'#f0b429', fear:'#f85149', extreme_fear:'#f85149' }[key] || '#8b949e';
}

function getSentimentEmoji(key) {
  return { extreme_greed:'🤑', greed:'😊', neutral:'😐', fear:'😰', extreme_fear:'😱' }[key] || '📊';
}

function fmtLarge(n) {
  if (n == null) return '--';
  const abs = Math.abs(n);
  if (abs >= 10000) return Number(n).toLocaleString('zh-TW', { maximumFractionDigits: 0 });
  if (abs >= 100)   return Number(n).toLocaleString('zh-TW', { maximumFractionDigits: 2 });
  return Number(n).toLocaleString('zh-TW', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
}

function renderMarket(data) {
  const panel      = document.getElementById('marketPanel');
  const sent       = data.sentiment || {};
  const score      = sent.score || 0;
  const scoreArc   = ((score / 100) * 157).toFixed(1);
  const sentColor  = getSentimentColor(sent.key);
  const sentEmoji  = getSentimentEmoji(sent.key);

  const factorRows = (sent.factors || []).map(f => {
    const pct = Math.round(f.score / f.max * 100);
    const bc  = pct >= 70 ? '#3fb950' : pct >= 45 ? '#58a6ff' : pct >= 25 ? '#f0b429' : '#f85149';
    return `<div class="mkt-factor-row">
      <span class="mkt-factor-name">${esc(f.label)}</span>
      <div class="mkt-factor-bar-wrap"><div class="mkt-factor-bar" style="width:${pct}%;background:${bc}"></div></div>
      <span class="mkt-factor-score" style="color:${bc}">${f.score}/${f.max}</span>
      <span class="mkt-factor-val">${esc(f.val)}</span>
    </div>`;
  }).join('');

  const IDX_ORDER = ['tw_idx','tw_50','sp500','nasdaq','dji','vix','gold','tnx'];
  const indexCards = IDX_ORDER.map(k => {
    const d = data[k];
    if (!d) return '';
    if (d.error) return `<div class="mkt-index-card"><div class="mkt-idx-name">${esc(d.name)}</div><div class="mkt-idx-error">資料暫無</div></div>`;
    const isUp = (d.change_pct || 0) >= 0;
    const cls  = chgCls(isUp);
    const sign = isUp ? '+' : '';
    const rsiColor = d.rsi != null ? (d.rsi > 70 ? '#f85149' : d.rsi < 30 ? '#3fb950' : 'var(--text)') : 'var(--muted)';
    const momColor = d.momentum != null ? (d.momentum > 0 ? '#3fb950' : '#f85149') : 'var(--muted)';
    return `<div class="mkt-index-card">
      <div class="mkt-idx-name">${esc(d.name)}</div>
      <div class="mkt-idx-price">${fmtLarge(d.price)}</div>
      <div class="mkt-idx-chg ${cls}">${sign}${d.change_pct != null ? d.change_pct.toFixed(2) : '--'}%</div>
      <div class="mkt-idx-stats">
        ${d.rsi != null ? `<div class="mkt-idx-stat"><span class="mkt-idx-stat-label">RSI</span><span class="mkt-idx-stat-val" style="color:${rsiColor}">${d.rsi}</span></div>` : ''}
        ${d.momentum != null ? `<div class="mkt-idx-stat"><span class="mkt-idx-stat-label">動能</span><span class="mkt-idx-stat-val" style="color:${momColor}">${(d.momentum > 0 ? '+' : '') + d.momentum.toFixed(1)}%</span></div>` : ''}
      </div>
    </div>`;
  }).join('');

  const wlRows = watchlist.map(w => {
    const isUp = (w.change_pct ?? 0) >= 0;
    const cls  = chgCls(isUp);
    const sign = isUp ? '+' : '';
    return `<tr onclick="showMain();loadQuote('${esc(w.symbol)}')">
      <td><strong>${esc(w.symbol)}</strong><div style="font-size:11px;color:var(--muted)">${esc(w.name || '')}</div></td>
      <td class="r">${w.price != null ? fmt(w.price) : '--'}</td>
      <td class="r ${cls}">${w.change_pct != null ? sign + fmt(w.change_pct) + '%' : '--'}</td>
    </tr>`;
  }).join('');

  const wlSection = watchlist.length > 0 ? `
    <div class="mkt-wl-card">
      <div style="padding:12px 16px 10px;border-bottom:1px solid var(--border)">
        <span class="section-title" style="margin:0">自選股摘要</span>
      </div>
      <table class="mkt-wl-table">
        <thead><tr><th>代號</th><th class="r">股價</th><th class="r">漲跌%</th></tr></thead>
        <tbody>${wlRows}</tbody>
      </table>
    </div>` : '';

  panel.innerHTML = `
    <div class="mkt-header">
      <div>
        <div style="font-size:18px;font-weight:700">市場概況</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">全球主要指數與市場情緒</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="mkt-updated">更新：${esc(data.updated || '--')}</span>
        <button class="btn-refresh" id="btnRefreshMarket" onclick="refreshMarket()">⟳ 重新整理</button>
        <button class="btn-back" onclick="showMain()">← 返回分析</button>
      </div>
    </div>

    <div class="mkt-sentiment-card">
      <div class="section-title" style="margin-bottom:14px">市場情緒指數</div>
      <div class="mkt-sent-inner">
        <div class="mkt-gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 140 88">
            <circle cx="70" cy="78" r="50" fill="none" stroke="#30363d" stroke-width="9"
              stroke-dasharray="157 314" stroke-dashoffset="-157" stroke-linecap="round"/>
            <circle cx="70" cy="78" r="50" fill="none" stroke="${sentColor}" stroke-width="9"
              stroke-dasharray="${scoreArc} 314" stroke-dashoffset="-157" stroke-linecap="round"
              style="transition:stroke-dasharray .7s ease"/>
            <text x="70" y="67" text-anchor="middle" fill="#e6edf3" font-size="27" font-weight="700" font-family="system-ui,sans-serif">${score}</text>
            <text x="70" y="82" text-anchor="middle" fill="#8b949e" font-size="9" font-family="system-ui,sans-serif">/ 100</text>
          </svg>
          <div class="mkt-sent-label" style="color:${sentColor}">${sentEmoji} ${esc(sent.label || '--')}</div>
          <div class="mkt-sent-sub">市場情緒評分</div>
        </div>
        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px">各因子貢獻分數</div>
          <div class="mkt-factors">${factorRows || '<div style="color:var(--muted);font-size:12px">資料不足，請稍後重試</div>'}</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title" style="margin-bottom:10px">主要市場指數</div>
      <div class="mkt-index-grid">${indexCards}</div>
    </div>

    ${wlSection}`;
}

// ═══ Init ═══════════════════════════════════════════════════
renderWatchlist();  // also calls renderGroupTabs() internally
applyTheme(currentTheme);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeStockModal(); });
</script>
</body>
</html>
