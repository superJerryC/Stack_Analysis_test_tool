<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 股票分析工具 — 登入</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --card: #1c2128; --border: #30363d;
      --accent: #58a6ff; --red: #f85149; --text: #e6edf3; --muted: #8b949e;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 44px 48px; width: 100%; max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
    }
    .logo { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #58a6ff, #3fb950);
      border-radius: 11px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .logo-title { font-size: 18px; font-weight: 700; }
    .logo-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; }
    label {
      display: block; font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px;
    }
    .input-wrap { position: relative; margin-bottom: 20px; }
    input[type=password] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 15px;
      padding: 12px 44px 12px 14px; outline: none; transition: border-color .15s;
      letter-spacing: 4px;
    }
    input[type=password]:focus { border-color: var(--accent); }
    input[type=password]::placeholder { letter-spacing: normal; color: var(--muted); }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 16px; padding: 4px; line-height: 1;
    }
    .toggle-pw:hover { color: var(--text); }
    .btn-login {
      width: 100%; background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 15px; font-weight: 600; padding: 13px;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-login:hover { opacity: .88; }
    .error {
      background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3);
      border-radius: 8px; color: var(--red); font-size: 13px;
      padding: 10px 14px; margin-bottom: 20px; text-align: center;
    }
    .footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 28px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">股</div>
      <div>
        <div class="logo-title">AI 股票分析工具</div>
        <div class="logo-sub">請輸入密碼以繼續使用</div>
      </div>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <label>存取密碼</label>
      <div class="input-wrap">
        <input type="password" id="pwInput" name="password" autofocus placeholder="輸入密碼">
        <button type="button" class="toggle-pw" onclick="togglePw()" id="eyeBtn">👁</button>
      </div>
      <button type="submit" class="btn-login">進入</button>
    </form>

    <div class="footer">AI 股票分析工具 &copy; 2025</div>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('pwInput');
      const btn = document.getElementById('eyeBtn');
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
      else { inp.type = 'password'; btn.textContent = '👁'; }
    }
    document.querySelector('form').addEventListener('submit', function() {
      document.querySelector('.btn-login').textContent = '驗證中…';
      document.querySelector('.btn-login').disabled = true;
    });
  </script>
</body>
</html>
